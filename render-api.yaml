services:
  - type: web
    name: enygma-api
    env: node
    region: oregon
    plan: free
    buildCommand: |
      cd artifacts/api-server && \
      npm install --legacy-peer-deps && \
      npm run build
    startCommand: cd artifacts/api-server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
