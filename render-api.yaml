services:
  - type: web
    name: enygma
    env: docker
    region: virginia
    plan: free
    dockerfile: ./Dockerfile
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: enygma-api
    env: docker
    region: virginia
    plan: free
    dockerfile: ./Dockerfile.api
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
