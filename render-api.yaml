services:
  - type: web
    name: enygma
    env: docker
    region: virginia
    plan: free
    dockerfile: ./Dockerfile
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: enygma-api
    env: node
    region: virginia
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm -F @workspace/api-server build
    startCommand: pnpm -F @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
