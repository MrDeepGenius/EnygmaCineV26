services:
  - type: web
    name: enygma-api
    env: node
    region: oregon
    plan: standard
    healthCheckPath: /health
    buildCommand: cd artifacts/api-server && npm install && npm run build
    startCommand: cd artifacts/api-server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
    maxInstances: 3

  - type: web
    name: enygma-frontend
    env: node
    region: oregon
    plan: standard
    buildCommand: cd artifacts/enygma && npm install && PORT=20693 BASE_PATH=/ npm run build
    startCommand: cd artifacts/enygma && npm run preview -- --host 0.0.0.0 --port 3000
    envVars:
      - key: PORT
        value: 20693
      - key: BASE_PATH
        value: /
