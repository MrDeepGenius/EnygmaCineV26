services:
  - type: web
    name: enygma-api
    env: node
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install --frozen-lockfile && cd artifacts/api-server && pnpm run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: enygma-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd artifacts/enygma && pnpm install --frozen-lockfile && pnpm run build
    startCommand: cd artifacts/enygma && pnpm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
