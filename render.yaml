services:
  - type: web
    name: enygma-api
    env: node
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: pnpm install && cd artifacts/api-server && pnpm run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: enygma-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && cd artifacts/enygma && pnpm run build
    startCommand: cd artifacts/enygma && pnpm run preview -- --host 0.0.0.0 --port 3000
    envVars:
      - key: NODE_ENV
        value: production
