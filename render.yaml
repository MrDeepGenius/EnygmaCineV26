services:
  - type: web
    name: enygma-api
    env: node
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: npm uninstall -g pnpm || true && npm install && cd artifacts/api-server && npm run build
    startCommand: cd artifacts/api-server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: enygma-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: npm uninstall -g pnpm || true && cd artifacts/enygma && npm install && npm run build
    startCommand: cd artifacts/enygma && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
